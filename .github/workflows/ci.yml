name: soft-ks-ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend smoke
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./traffic_system.db
      APP_BASE_URL: http://localhost:8000
      MODEL_PATH: best.pt
      DETECTOR_MODE: auto
      TOKEN_SECRET: ci-token-secret
      TOKEN_TTL_SECONDS: 86400
      MAX_UPLOAD_MB: 10
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run backend smoke checks
        run: python -B scripts/smoke_backend.py

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: traffic-sign-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: traffic-sign-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

      - name: Build frontend
        run: npm run build

  compose:
    name: Deployment config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config
